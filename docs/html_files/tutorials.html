<!DOCTYPE html>
<html>
  <body>
    <script>
      const titleName = "tutorials";
      const markdownFile = "/markdown_files/tutorials.md";

      // Redirect and pass values via URL
      const url =
        "/html_files/default_template.html?title=" +
        encodeURIComponent(titleName) +
        "&file=" +
        encodeURIComponent(markdownFile);

      window.location.href = url;
    </script>
  </body>
</html>
