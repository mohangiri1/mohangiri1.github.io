<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mohan Giri</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .container {
      flex: 1;
      padding: 2rem;
      max-width: 1000px;
      margin: auto;
      background-color: #fff;
    }

    footer {
      background-color: #333;
      color: #fff;
      text-align: center;
      padding: 1rem 0;
      margin-top: auto;
    }

    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      border-bottom: 2px solid #333;
      padding-bottom: 0.3rem;
    }

    .markdown-body p {
      line-height: 1.6;
    }

    .recent-post-card {
      border: 1px solid #ddd;
      padding: 1rem;
      margin-top: 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .recent-post-card:hover {
      background: #f1f1f1;
    }

    .recent-post-card h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div id="header"></div>

  <!-- Content -->
  <div class="container markdown-body" id="content">
    <p>Loading content...</p>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // Load header/footer
    async function loadHTML(id, file) {
      try {
        const res = await fetch(file);
        const html = await res.text();
        document.getElementById(id).innerHTML = html;

        if (id === "footer") {
          const span = document.getElementById("year");
          if (span) span.textContent = new Date().getFullYear();
        }
      } catch (err) {
        console.error("Error loading", file, err);
      }
    }

    loadHTML("header", "/html_files/header.html");
    loadHTML("footer", "/html_files/footer.html");

    // Load and render Markdown file
    async function loadMarkdown(mdFile, targetId) {
      try {
        const response = await fetch(mdFile);
        const mdText = await response.text();
        document.getElementById(targetId).innerHTML = marked.parse(mdText);
      } catch (err) {
        console.error("Markdown load error:", err);
        document.getElementById(targetId).innerHTML =
          "<p>Unable to load content.</p>";
      }
    }

    // Load index.md first
    loadMarkdown("/markdown_files/index.md", "content");

// Load recent blog previews (up to 3)
async function loadRecentPost() {
  try {
    const resIndex = await fetch("/markdown_files/blogs_index.json");
    const blogList = await resIndex.json();

    if (blogList.length === 0) return;

    // take max 3
    const recentBlogs = blogList.slice(0, 3);

    let recentHTML = `<h2>Recent Posts</h2>`;

    for (const blog of recentBlogs) {
      const mdPath = `/markdown_files/${blog}`;
      const resMD = await fetch(mdPath);
      const mdText = await resMD.text();

      const firstParagraph = mdText.split(/\r?\n\r?\n/)[0];
      const blogTitle = blog.replace(/_/g, " ").replace(".md", "");

      recentHTML += `
        <div class="recent-post-card" onclick="openBlog('${mdPath}', '${blogTitle}')">
          <!-- <h3>${blogTitle}</h3> -->
          <p>${marked.parse(firstParagraph)}</p>
          <p style="color:#0066cc;"><em>See more →</em></p>
        </div>
      `;
    }

    // Append after index.md content
    document.getElementById("content").innerHTML += recentHTML;

  } catch (err) {
    console.error("Failed to load recent posts:", err);
  }
}

    function openBlog(file, title) {
      const url = `/html_files/default_template.html?title=${encodeURIComponent(title)}&file=${encodeURIComponent(file)}`;
      window.location.href = url;
    }

    // Load recent post after index.md loads
    loadRecentPost();
  </script>
</body>
</html>
